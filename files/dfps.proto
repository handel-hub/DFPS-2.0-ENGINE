syntax = "proto3";

package dfps;

import "google/protobuf/struct.proto";

// ─── Master → Worker ──────────────────────────────────────────────────────────

message PriorityMetadata {
  string class              = 1;
  double base_priority_score = 2;
  int64  arrival_timestamp  = 3;
  // Open extra fields (additionalProperties: true in schema)
  google.protobuf.Struct extras = 4;
}

// workloadData.context[] — value is any JSON type
message ContextEntry {
  string               key   = 1;
  google.protobuf.Value value = 2;
}

message WorkloadData {
  double                total_payload_size_mb = 1;
  optional int64        measured_at           = 2;
  repeated ContextEntry context               = 3;
}

message DataContext {
  string          input_uri  = 1;
  string          output_uri = 2;
  string          context_id = 3;
  optional string extension  = 4;
  optional string mime_type  = 5;
}

message PipelineStage {
  string          stage_id   = 1;
  string          plugin_id  = 2;
  optional string action     = 3;
  repeated string depends_on = 4;
  bool            is_critical = 5;
  // Free-form per-stage config
  google.protobuf.Struct metadata = 6;
}

message JobAssignment {
  string          job_id            = 1;
  optional string modality          = 2;
  PriorityMetadata priority_metadata = 3;
  WorkloadData     workload_data     = 4;
  DataContext      data_context      = 5;
  repeated PipelineStage pipeline   = 6;
  // Both open objects — map cleanly to Struct
  google.protobuf.Struct computed   = 7;
  google.protobuf.Struct meta       = 8;
}

// ─── Worker → Master ──────────────────────────────────────────────────────────

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_ACCEPTED    = 1; // worker received the job
  JOB_STATUS_RUNNING     = 2; // a pipeline stage is in progress
  JOB_STATUS_STAGE_DONE  = 3; // individual stage completed
  JOB_STATUS_DONE        = 4; // all stages complete
  JOB_STATUS_FAILED      = 5; // unrecoverable failure
}

message WorkerAck {
  string    job_id        = 1;
  JobStatus status        = 2;
  optional string stage_id      = 3; // set when RUNNING or STAGE_DONE
  optional string error_message = 4; // set when FAILED
  // Free-form result payload on DONE
  google.protobuf.Struct result = 5;
  int64 timestamp_ms            = 6; // epoch millis
}

// ─── Service ──────────────────────────────────────────────────────────────────

service MasterWorkerService {
  // Worker opens this stream; master pushes JobAssignment, worker pushes WorkerAck.
  // Both sides can write independently at any time.
  rpc JobChannel(stream WorkerAck) returns (stream JobAssignment);
}
